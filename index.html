<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课程展示 · 墨澜 × 诙谐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Courgette&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        /* ── Background ── */
        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse 120% 80% at 20% 30%, rgba(140,190,225,.50) 0%, transparent 55%),
                radial-gradient(ellipse 100% 90% at 80% 70%, rgba(160,200,235,.40) 0%, transparent 50%),
                radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(200,225,250,.35) 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 0% 100%, rgba(130,175,215,.25) 0%, transparent 40%),
                linear-gradient(175deg, #d5e6f3 0%, #c2d9ec 25%, #afcde4 50%, #c0d8ec 75%, #d8e9f6 100%);
            background-attachment: fixed;
            font-family: 'Noto Serif SC', serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px 80px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ── Floating decorative blobs (behind glass) ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-blob-1 {
            width: 360px; height: 360px;
            background: radial-gradient(circle, rgba(255,255,255,.35), transparent 70%);
            top: 8%; right: 5%;
        }
        .bg-blob-2 {
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(200,220,240,.30), transparent 70%);
            bottom: 12%; left: 3%;
        }
        .bg-blob-3 {
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(180,210,235,.25), transparent 70%);
            top: 50%; left: 60%;
        }

        /* ── Large "PSYCHOLOGY" Background Text ── */
        .bg-psychology {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: clamp(120px, 18vw, 280px);
            font-weight: 900;
            color: rgba(255,255,255,.20);
            letter-spacing: 8px;
            white-space: nowrap;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) rotate(-8deg);
            user-select: none;
            font-family: 'Noto Serif SC', serif;
            line-height: 1;
            text-shadow: 0 20px 60px rgba(255,255,255,.15);
        }

        /* ── Container ── */
        .container {
            max-width: 820px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        header h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            color: #255773;
            letter-spacing: 5px;
            text-shadow: 0 2px 20px rgba(255,255,255,.5);
            font-family: '仲春仿宋', 'Noto Serif SC', serif;
            font-feature-settings: "trad";
        }
        header .sub {
            font-family: 'Courgette', cursive;
            font-size: 16px;
            color: #709bb5;
            margin-top: 6px;
            letter-spacing: 3px;
        }

        /* ── Section ── */
        .section { margin-bottom: 48px; }
        .section-title h2 {
            font-size: clamp(20px, 3.5vw, 26px);
            font-weight: 700;
            color: #255773;
            letter-spacing: 3px;
            margin-bottom: 18px;
            text-align: center;
            font-family: '仲春仿宋', 'Noto Serif SC', serif;
            font-feature-settings: "trad";
        }

        /* ══════════ Glass Card — True Frosted Glass ══════════ */
        .glass-card {
            background: rgba(255,255,255,.05);
            backdrop-filter: blur(50px) saturate(1.1);
            -webkit-backdrop-filter: blur(50px) saturate(1.1);
            border-radius: 26px;
            border: 1px solid rgba(255,255,255,.30);
            box-shadow:
                /* depth shadow */
                0 12px 48px rgba(60,110,150,.07),
                0 4px 12px rgba(60,110,150,.04),
                /* glass edge — thin inner highlight */
                inset 0 0 0 1px rgba(255,255,255,.12),
                /* top inner shine */
                inset 0 1px 0 rgba(255,255,255,.35),
                /* bottom inner shadow for depth */
                inset 0 -1px 0 rgba(0,0,0,.03);
            position: relative;
            overflow: hidden;
            /* subtle noise texture via repeating gradient */
            background-image: repeating-conic-gradient(rgba(255,255,255,.01) 0% .0001%, transparent .0001% .06%);
        }

        /* Glass edge bevel highlight (top) */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 6px; right: 6px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
            pointer-events: none;
            z-index: 2;
        }

        /* Glass angular sheen / reflection */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                155deg,
                rgba(255,255,255,.18) 0%,
                rgba(255,255,255,.03) 28%,
                transparent 45%,
                transparent 75%,
                rgba(255,255,255,.06) 100%
            );
            pointer-events: none;
            z-index: 2;
        }

        /* ── Card List ── */
        .card-list {
            list-style: none;
            position: relative;
            z-index: 1;
            padding: 8px 0;
        }
        .card-list li {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,.14);
            transition: background .25s;
            position: relative;
        }
        .card-list li:last-child { border-bottom: none; }
        .card-list li:hover {
            background: rgba(255,255,255,.06);
        }

        /* ── Course Item ── */
        .course-item {
            display: flex;
            align-items: baseline;
            gap: 14px;
            position: relative;
            min-height: 48px;
        }
        .course-item .idx {
            flex-shrink: 0;
            width: 30px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(90,140,170,.7);
            text-align: right;
            font-family: 'Courgette', cursive;
            transition: transform .25s, color .25s;
        }

        /* ── Flip Zone ── */
        .flip-zone {
            flex: 1;
            position: relative;
            min-height: 38px;
            display: flex;
            align-items: center;
        }
        .flip-front,
        .flip-back {
            font-weight: 600;
            color: #1d4a64;
            line-height: 1.5;
            transition: opacity .35s ease, transform .35s ease;
            font-family: '仲春仿宋', 'Noto Serif SC', serif;
            font-feature-settings: "trad";
        }
        .flip-front {
            font-size: clamp(19px, 2.6vw, 23px);
            opacity: 1;
            transform: translateY(0);
        }
        .flip-back {
            position: absolute;
            top: 50%;
            left: 0;
            opacity: 0;
            transform: translateY(calc(-50% + 6px));
            color: #3d7798;
            font-size: clamp(20px, 2.4vw, 24px);
            font-weight: 400;
            white-space: nowrap;
            pointer-events: none;
        }

        /* ── Desktop: hover → flip reveal ── */
        @media (hover: hover) and (pointer: fine) {
            .card-list li:hover .flip-front {
                opacity: 0;
                transform: translateY(-10px);
            }
            .card-list li:hover .flip-back {
                opacity: 1;
                transform: translateY(-50%);
            }
            .card-list li:hover .idx {
                color: rgba(90,140,170,1);
                transform: scale(1.15);
            }
        }

        /* ── Touch: active → fade in theme ── */
        @media (hover: none) and (pointer: coarse) {
            .card-list li.flipped .flip-front {
                opacity: 0;
                transform: translateY(-8px);
            }
            .card-list li.flipped .flip-back {
                opacity: 1;
                transform: translateY(-50%);
            }
            .card-list li {
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body { padding: 32px 12px 56px; }
            .glass-card { border-radius: 20px; }
            .card-list li { padding: 14px 16px; }
            .flip-front { font-size: 18px; }
            .flip-back { font-size: 15px; }
            header { margin-bottom: 34px; }
            .section { margin-bottom: 34px; }
        }

        /* ── Animations ── */
        .glass-card {
            opacity: 0;
            transform: translateY(20px);
            animation: rise .5s ease forwards;
        }
        .section:last-child .glass-card { animation-delay: .10s; }
        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Floating decorative blobs -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>

    <!-- Large PSYCHOLOGY background -->
    <div class="bg-psychology">PSYCHOLOGY</div>

    <div class="container">

        <header>
            <h1>✦ 课程展示 ✦</h1>
            <div class="sub">· Course Gallery ·</div>
        </header>

        <!-- ── 墨澜 ── -->
        <section class="section">
            <div class="section-title"><h2>墨澜</h2></div>
            <div class="glass-card">
                <ul class="card-list">
                    <li>
                        <div class="course-item">
                            <span class="idx">01</span>
                            <div class="flip-zone">
                                <span class="flip-front">我们是人生旅者</span>
                                <span class="flip-back">身份认同</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">02</span>
                            <div class="flip-zone">
                                <span class="flip-front">此刻是路标</span>
                                <span class="flip-back">活在当下</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">03</span>
                            <div class="flip-zone">
                                <span class="flip-front">为什么山就在那儿</span>
                                <span class="flip-back">目标感</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">04</span>
                            <div class="flip-zone">
                                <span class="flip-front">假如遇到思想钢印机</span>
                                <span class="flip-back">信念 · 自我信赖</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">05</span>
                            <div class="flip-zone">
                                <span class="flip-front">又一次挥舞登山杖</span>
                                <span class="flip-back">刻意练习</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">06</span>
                            <div class="flip-zone">
                                <span class="flip-front">那块糖没这么苦</span>
                                <span class="flip-back">自控力</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">07</span>
                            <div class="flip-zone">
                                <span class="flip-front">总有风景更美丽</span>
                                <span class="flip-back">完美主义</span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </section>

        <!-- ── 诙谐 ── -->
        <section class="section">
            <div class="section-title"><h2>诙谐</h2></div>
            <div class="glass-card">
                <ul class="card-list">
                    <li>
                        <div class="course-item">
                            <span class="idx">01</span>
                            <div class="flip-zone">
                                <span class="flip-front">户外正念练习 · 搭曼陀罗环</span>
                                <span class="flip-back">深中河</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item">
                            <span class="idx">02</span>
                            <div class="flip-zone">
                                <span class="flip-front">移空疗法</span>
                                <span class="flip-back">大约在期中考试前</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="course-item plain">
                            <span class="idx">03</span>
                            <div class="flip-zone">
                                <span class="flip-front">脏话心理学</span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </section>

    </div>

    <script>
    (function(){
        // ── Arrow Tutorial Hint ──
        var isTouch = window.matchMedia('(hover:none) and (pointer:coarse)').matches;
        var firstLi = document.querySelector('.card-list li');
        var glassCard = firstLi ? firstLi.closest('.glass-card') : null;

        if (firstLi && glassCard) {
            // Calculate position relative to glass card
            var liTop = firstLi.offsetTop;
            var glassStyle = window.getComputedStyle(glassCard);
            var glassPadding = parseInt(glassStyle.paddingTop) || 32;

            // Create hint wrapper
            var bubble = document.createElement('div');
            bubble.id = 'tutorial-bubble';
            bubble.style.cssText = [
                'position:absolute',
                'z-index:10',
                'left:24px',
                'top:' + (liTop + glassPadding - 14) + 'px',
                'background:rgba(255,255,255,.72)',
                'backdrop-filter:blur(14px)',
                '-webkit-backdrop-filter:blur(14px)',
                'border-radius:12px',
                'padding:9px 18px',
                'font-size:15px',
                'color:#255773',
                'font-weight:600',
                'pointer-events:none',
                'white-space:nowrap',
                'border:1px solid rgba(255,255,255,.45)',
                'box-shadow:0 3px 16px rgba(60,110,150,.10)',
                'opacity:0',
                'transform:translateY(-52px)',
                'font-family:\"仲春仿宋\",\"Noto Serif SC\",serif',
                'font-feature-settings:\"trad\"'
            ].join(';');
            bubble.textContent = isTouch ? '点击查看主题' : '悬停查看主题';

            // Create arrow (CSS triangle pointing down at the item)
            var arrow = document.createElement('div');
            arrow.style.cssText = [
                'position:absolute',
                'z-index:10',
                'left:50px',
                'top:' + (liTop + glassPadding - 6) + 'px',
                'width:0','height:0',
                'border-left:8px solid transparent',
                'border-right:8px solid transparent',
                'border-top:8px solid rgba(255,255,255,.72)',
                'backdrop-filter:blur(14px)',
                'opacity:0',
                'transform:translateY(-52px)',
                'pointer-events:none'
            ].join(';');

            // Animation
            var bAni = 'tutorialBounce .6s ease .8s forwards, tutorialOut .4s ease 7s forwards';
            bubble.style.animation = bAni;
            arrow.style.animation = bAni;

            glassCard.appendChild(bubble);
            glassCard.appendChild(arrow);

            // Dismiss on any interaction
            var dismiss = function(){
                bubble.style.transition = 'opacity .3s';
                arrow.style.transition = 'opacity .3s';
                bubble.style.opacity = '0';
                arrow.style.opacity = '0';
                setTimeout(function(){
                    if(bubble.parentNode) bubble.parentNode.removeChild(bubble);
                    if(arrow.parentNode) arrow.parentNode.removeChild(arrow);
                }, 400);
            };
            document.addEventListener('click', dismiss, {once:true});
            document.addEventListener('mousemove', dismiss, {once:true});
            setTimeout(function(){ if(bubble.parentNode) dismiss(); }, 9000);
        }

        // ── Add keyframes ──
        var styleEl = document.createElement('style');
        styleEl.textContent = [
            '@keyframes tutorialBounce {',
            '  0% { opacity:0; transform:translateY(-52px); }',
            '  60% { opacity:1; transform:translateY(2px); }',
            '  100% { opacity:1; transform:translateY(0); }',
            '}',
            '@keyframes tutorialOut {',
            '  to { opacity:0; transform:translateY(-12px); }',
            '}'
        ].join('');
        document.head.appendChild(styleEl);

        // ── Mobile tap ──
        if (isTouch || window.matchMedia('(max-width:1024px)').matches) {
            document.querySelectorAll('.card-list li').forEach(function(li){
                li.addEventListener('click', function(e){
                    e.stopPropagation();
                    var was = li.classList.contains('flipped');
                    document.querySelectorAll('.card-list li.flipped').forEach(function(el){
                        el.classList.remove('flipped');
                    });
                    if (!was) li.classList.add('flipped');
                });
            });
            document.addEventListener('click', function(){
                document.querySelectorAll('.card-list li.flipped').forEach(function(el){
                    el.classList.remove('flipped');
                });
            });
        }
    })();
    </script>

</body>
</html>
